# fly.toml app configuration file generated for test-bot-uz on 2026-04-30T10:25:05Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'test-bot-uz'
primary_region = 'fra'

[build]

[[mounts]]
  source = 'bot_data'
  destination = '/app/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
